<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cheapest Product</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="panel-container">
        <header class="panel-header">
            <h1>💰 The Cheapest Product</h1>
            <p class="tagline">Compare prices instantly</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Enter product name..."
                autocomplete="off"
            >
            <button id="searchBtn" class="search-btn">Search All</button>
        </div>

        <!-- Retailers Section -->
        <div class="retailers-section">
            <div class="section-header">
                <h2>Retailers</h2>
                <button id="addSiteBtn" class="add-btn" title="Add custom retailer">+</button>
            </div>
            <div id="retailersList" class="retailers-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Add Site Form (hidden by default) -->
        <div id="addSiteForm" class="add-site-form hidden">
            <h3>Add Custom Retailer</h3>
            <input type="text" id="siteName" placeholder="Site name (e.g., Newegg)">
            <input type="text" id="siteUrl" placeholder="Search URL with {query}">
            <p class="hint">Example: https://newegg.com/p/pl?d={query}</p>
            <div class="form-actions">
                <button id="cancelAdd" class="btn-cancel">Cancel</button>
                <button id="confirmAdd" class="btn-confirm">Add</button>
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="status hidden"></div>

        <!-- Footer -->
        <footer class="panel-footer">
            <p>Click "Search All" to open split-view</p>
        </footer>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
